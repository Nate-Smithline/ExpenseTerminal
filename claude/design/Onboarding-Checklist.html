<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ExpenseTerminal — In-app Checklist Onboarding (design reference)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="onb.css" />
<style>
  /* preview-only chrome: a small variant switcher so a developer can see
     every state. NONE of this ships — it is not part of the design. */
  .ref{height:100%;display:flex;flex-direction:column}
  .ref__bar{flex:0 0 auto;height:48px;display:flex;align-items:center;gap:14px;padding:0 18px;
    background:#15171c;color:#e8eaed;font:600 12.5px/1 "Hanken Grotesk",sans-serif}
  .ref__bar .tag{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#8b9099;font-weight:700}
  .ref__bar .grp{display:inline-flex;align-items:center;gap:7px;margin-left:6px}
  .ref__bar label{color:#aeb3bb;font-weight:500}
  .ref__bar select{background:#23262d;color:#fff;border:1px solid #34384177;border-radius:7px;
    padding:5px 8px;font:600 12px "Hanken Grotesk",sans-serif}
  .ref__bar .sp{flex:1}
  .ref__bar a{color:#9fb7ff;text-decoration:none;font-weight:600}
  .ref__view{flex:1;min-height:0;position:relative}
  .ref__view #root{position:absolute;inset:0}
</style>
</head>
<body>
<div class="ref">
  <div class="ref__bar">
    <span class="tag">Design reference</span>
    <span style="font-weight:700">In-app checklist onboarding</span>
    <span class="grp"><label>Gamification</label>
      <select id="sel-gamify"><option value="playful">playful</option><option value="subtle">subtle</option></select>
    </span>
    <span class="grp"><label>Billing</label>
      <select id="sel-billing"><option value="trial">trial</option><option value="direct">direct</option></select>
    </span>
    <span class="sp"></span>
    <span class="tag">See README.md for the spec</span>
  </div>
  <div class="ref__view"><div id="root"></div></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="checklist.jsx"></script>
<script type="text/babel">
  /* Minimal root — renders ONLY the in-app checklist (the production app would
     mount <InApp> inside its real shell). `tweaks` are the two design variants. */
  function Ref() {
    const [gamify, setGamify] = React.useState("playful");
    const [billing, setBilling] = React.useState("trial");
    React.useEffect(() => {
      const g = document.getElementById("sel-gamify");
      const b = document.getElementById("sel-billing");
      g.onchange = e => setGamify(e.target.value);
      b.onchange = e => setBilling(e.target.value);
    }, []);
    return <InApp tweaks={{ gamify, billing, annualDefault: false }} />;
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Ref />);
</script>
</body>
</html>
